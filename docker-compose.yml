version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: odisea-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DATABASE:-odisea_db}
      POSTGRES_USER: ${PG_USER:-odisea_user}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
    ports:
      - "${PG_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql:/docker-entrypoint-initdb.d

  mysql:
    image: mysql:8.4
    container_name: odisea-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-odin_user_data}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: odisea-pma
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 500M
    ports:
      - "${PMA_PORT:-8080}:80"
    depends_on:
      - mysql

volumes:
  postgres_data:
  mysql_data:
